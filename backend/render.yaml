services:
  - type: web
    name: aui-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: FRONTEND_URL
        sync: false  # Set this to your Vercel URL after deploying frontend
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: "file:./prod.db"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
